<!doctype html>
<html lang="en">
  <head>
    <title>Rita McDonald Portfolio | Play Page</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/svg+xml"
      href="assets/branding-images/favicon.svg"
    />
    <link
      rel="icon"
      type="image/png"
      href="assets/branding-images/favicon.png"
    />

    <meta property="og:image" content="screenshot.jpg" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="./lightbox2/dist/css/lightbox.min.css" />
    <link rel="stylesheet" href="./styles/style.css" />

    <style>
      .masonry-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        padding: 40px;
      }

      .masonry-item {
        list-style: none;
      }

      .masonry-item a {
        display: block;
      }

      .masonry-item img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: contain; /
        background: #f5f5f5;
        display: block;
        border-radius: 8px;
      }

      @media (max-width: 900px) {
        .masonry-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 600px) {
        .masonry-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body class="play-page">
    <section class="hero">
      <header class="hero-header">
        <ul class="nav-branding">
          <!-- Logo (standalone LI) -->
          <li class="nav-branding-logo">
            <a href="index.html">
              <img
                src="assets/branding-images/rita-mcdonald-logo.svg"
                alt="Your portfolio logo"
              />
            </a>
          </li>
          <li class="nav-branding-item">
            <ul class="nav-branding-group">
              <li class="nav-branding-item">
                <a href="index.html" class="nav-link-primary">Work</a>
              </li>
              <li class="nav-branding-item">
                <a href="play.html" class="nav-link-primary">Play</a>
              </li>
              <li class="nav-branding-item">
                <a href="about.html" class="nav-link-primary">About</a>
              </li>
            </ul>
          </li>
        </ul>
      </header>

      <div class="hero-headline-wrapper">
        <h1 class="hero-headline">Welcome to my drawing book!</h1>
      </div>
    </section>

    <main>
      <section class="portfolio">
        <ul class="masonry-grid">
          <li class="masonry-item">
            <a
              href="assets/branding-images/rita-mcdonald-house.jpg"
              data-lightbox="gallery"
            >
              <img
                src="assets/branding-images/rita-mcdonald-house.jpg"
                alt="House drawing"
              />
            </a>
          </li>

          <li class="masonry-item">
            <a
              href="assets/branding-images/rita-mcdonald-headphones.jpg"
              data-lightbox="gallery"
            >
              <img
                src="assets/branding-images/rita-mcdonald-headphones.jpg"
                alt="Headphones drawing"
              />
            </a>
          </li>

          <li class="masonry-item">
            <a
              href="assets/branding-images/rita-mcdonald-sun.jpg"
              data-lightbox="gallery"
            >
              <img
                src="assets/branding-images/rita-mcdonald-sun.jpg"
                alt="Sun drawing"
              />
            </a>
          </li>

          <li class="masonry-item">
            <a
              href="assets/branding-images/rita-mcdonald-ball.jpg"
              data-lightbox="gallery"
            >
              <img
                src="assets/branding-images/rita-mcdonald-ball.jpg"
                alt="Ball drawing"
              />
            </a>
          </li>

          <li class="masonry-item">
            <a
              href="assets/branding-images/rita-mcdonald-30s.jpg"
              data-lightbox="gallery"
            >
              <img
                src="assets/branding-images/rita-mcdonald-30s.jpg"
                alt="30s drawing"
              />
            </a>
          </li>

          <li class="masonry-item">
            <a
              href="assets/branding-images/rita-mcdonald-shapes.jpg"
              data-lightbox="gallery"
            >
              <img
                src="assets/branding-images/rita-mcdonald-shapes.jpg"
                alt="Shapes drawing"
              />
            </a>
          </li>
        </ul>
      </section>
      <footer class="footer">
        <div class="footer-inner">
          <!-- LEFT: BRAND / MESSAGE -->
          <div class="footer-brand">
            <h2>Rita McDonald</h2>
            <p>UX Design Student creating thoughtful digital experiences.</p>
          </div>

          <!-- MIDDLE: NAV -->
          <div class="footer-nav">
            <h4>Explore</h4>
            <ul>
              <li><a href="index.html">Work</a></li>
              <li><a href="play.html">Play</a></li>
              <li><a href="about.html">About</a></li>
            </ul>
          </div>

          <!-- RIGHT: SOCIAL -->
          <div class="footer-social">
            <h4>Connect</h4>
            <ul>
              <li><a href="#">Instagram</a></li>
              <li><a href="#">LinkedIn</a></li>
            </ul>
          </div>
        </div>

        <!-- BOTTOM BAR -->
        <div class="footer-bottom">
          <p>© 2026 Rita McDonald</p>
          <a href="#top">Back to top ↑</a>
        </div>
      </footer>
    </main>
  </body>
</html>
